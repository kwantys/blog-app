name: CI — Blog App

# Запускається при кожному push та pull request у гілки main і develop
on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:

  # ── Job 1: Lint (flake8) ──────────────────────────────────────────────────
  lint:
    name: Code Style (flake8)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install flake8
        run: pip install flake8==7.1.0

      - name: Run flake8
        run: |
          flake8 app/ config.py run.py \
            --max-line-length=100 \
            --exclude=__pycache__,.venv \
            --extend-ignore=SIM102,SIM118 \
            --format=default
        continue-on-error: false

  # ── Job 2: Tests + Coverage ───────────────────────────────────────────────
  test:
    name: Unit Tests (pytest)
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create .env file
        run: |
          echo "SECRET_KEY=ci-test-secret-key" > .env

      - name: Run tests with coverage
        run: |
          pytest tests/ -v \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --tb=short

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  # ── Job 3: Code Quality (flake8 detailed + complexity) ───────────────────
  quality:
    name: Code Quality (flake8 + complexity)
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install quality tools
        run: |
          pip install flake8==7.1.0 \
                      flake8-bugbear \
                      flake8-simplify \
                      radon

      - name: Run flake8 with bugbear (code smells)
        run: |
          flake8 app/ config.py run.py \
            --max-line-length=100 \
            --select=E,W,B,SIM \
            --exclude=__pycache__,.venv
        continue-on-error: true

      - name: Run radon — Cyclomatic Complexity
        run: |
          echo "=== Cyclomatic Complexity ==="
          radon cc app/ -s -a
          echo ""
          echo "=== Maintainability Index ==="
          radon mi app/ -s